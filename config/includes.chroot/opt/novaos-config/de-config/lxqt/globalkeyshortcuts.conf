# NovaOS — LXQt Global Keyboard Shortcuts
# Drop into /etc/skel/.config/lxqt/globalkeyshortcuts.conf
# Format: <unique_id>|<command>|<shortcut>
#
# These override LXQt defaults with student-friendly bindings.

# --- Launchers ---
terminal=lxqt-globalkeyshcuts-0__terminal=qterminal
file_manager=lxqt-globalkeyshcuts-0__file_manager=pcmanfm-qt
browser=lxqt-globalkeyshcuts-0__browser=firefox
editor=lxqt-globalkeyshcuts-0__editor=code

# --- Window management ---
# (These are usually provided by kglobalaccel or window manager)
# Leave empty to use lxqt default mappings

# --- NovaOS-specific ---
novaos_welcome=lxqt-globalkeyshcuts-0__novaos_welcome=novaos-welcome
novaos_docs=lxqt-globalkeyshcuts-0__novaos_docs=xdg-open https://docs.novaos.local

# --- Disable conflicting LXQt defaults (comment out to restore) ---
# show_desktop=
# lock_screen=

# Notes on keys:
#   XF86Terminal = the "Terminal" multimedia key on some keyboards
#   <Primary>     = Ctrl
#   <Meta>        = Super / Windows key
#   <Shift>, <Alt>
# Examples: "Ctrl+Alt+T", "Meta+E", "F2"
