# NovaOS post-install branding hook
# Drop into /etc/calamares/modules/shellprocess-novaosbranding.conf
# Referenced by the "novaosbranding" instance defined in settings.conf
# (see calamares-branding/settings.conf.snippet for the full wiring).
---
script: "/etc/calamares/scripts/novaos-branding-postinstall.sh"
timeout: 300
verbose: true
