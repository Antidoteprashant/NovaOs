# NovaOS — LXQt Panel Configuration
# Drop into /etc/skel/.config/lxqt/panel.conf (live-build) or
# /etc/xdg/lxqt/panel.conf (system-wide default).
#
# This configures:
#   - bottom panel, 28px tall (compact for small screens)
#   - left-side global menu (app launcher)
#   - taskbar with window grouping
#   - system tray
#   - clock, logout button

[panel1]
alignment=-1
animationDuration=0
hideOnOverlap=false
iconSize=22
length=100
margin=2
position=Bottom
reserveSpace=true
size=28
widthType=0

# Plugins run left-to-right in this order.
# mainmenu = "NovaOS" app menu
# taskbar  = running windows
# systray  = network, volume, battery
# clock    = date/time
# showdesktop = minimize all
# logout   = shutdown menu
plugins=mainmenu,spacer,taskbar,spacer,systray,clock,showdesktop,logout

[mainmenu]
type=mainmenu
icon=start-here
label=NovaOS
customIcon=/usr/share/novaos/icons/novaos-logo.svg
customLabel=

[spacer1]
type=spacer
expand=true
size=0

[taskbar]
type=taskbar
buttonWidth=160
groupingEnabled=true
iconsOnly=false
maxWidth=0
middleClickClose=true
raiseOnCurrentDesktop=true
showGrouped=true
showOnlyCurrentDesktopTasks=false
showOnlyCurrentScreen=false
showWindowIcon=true
switchTasksOnHover=true
taskwheelEnabled=true
useWheelForScrolling=true

[systray]
type=systray
iconSize=18
pinningAllowed=true
primaryScreenOnly=false

[clock]
type=clock
dateFormat=ddd MMM d
showSeconds=true
timeFormat=HH:mm
timeZone=UTC
useDateFormat=false
weekDayFormat=ddd

[showdesktop]
type=showdesktop
alignment=Right

[logout]
type=logout
icon=system-log-out
label=Power
customIcon=/usr/share/novaos/icons/power.svg
customLabel=Power
showHibernate=true
showLockScreen=true
showReboot=true
showShutdown=true
showSuspend=true
showUserSwitch=false
