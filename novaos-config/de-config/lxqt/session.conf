# NovaOS — LXQt Session Configuration
# Drop into /etc/skel/.config/lxqt/session.conf
#
# Controls which apps start with the LXQt session and
# which window manager to use.

[General]
__userfile__=true

# Window manager — Openbox is LXQt's default, fastest on low-RAM
windowManager=openbox

# LXQt modules to autostart with the session
modules=systray,runner,globalshortcuts,policykit

[Environment]
# XDG runtime dir is set by PAM — no override needed

[Keyboard]
# Num lock OFF by default (students on laptops rarely have numpad)
numlock=false

[AutoStart]
# NovaOS Welcome app fires on first login (managed via autostart .desktop)
# — see novaos-branding-postinstall.sh which drops the .desktop into
#   /etc/skel/.config/autostart/novaos-welcome.desktop
