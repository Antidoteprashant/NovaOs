# NovaOS — LXQt Session Configuration
# Drop into /etc/skel/.config/lxqt/lxqt.conf
# Sets the Qt theme, icon theme, and font globally.

[General]
__userfile__=true

[Qt]
style=qt5ct-style
fixed=forkawesome,11,-1,5,50,0,0,0,0,0,Regular
font=Inter,11,-1,5,50,0,0,0,0,0,Regular

# Icon theme: NovaOS-Icon (custom, see de-config/icons/)
icon_theme=NovaOS-Icon

# GTK theme for non-Qt apps: Adwaita-dark (we ship a custom override too)
gtk_theme=Adwaita-dark
gtk_icon_theme=NovaOS-Icon

# Cursor
cursor_theme=Adwaita
cursor_size=24

# Double-click interval (ms)
doubleClickInterval=400

# Disabled compositing for low-RAM machines
# (LXQt has no compositor by default — keep it that way for 2GB laptops)
