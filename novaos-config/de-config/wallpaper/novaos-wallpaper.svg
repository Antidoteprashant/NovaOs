<?xml version="1.0" encoding="UTF-8"?>
<!--
  NovaOS Wallpaper (1920x1080)
  Subtle gradient with a stylized "starburst" — 6 thin rays in nova-accent
  emanating from the top-left, suggesting a nova (exploding star).
  No text, no logo — just a calm, dark background.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="0%" cy="0%" r="120%">
      <stop offset="0%"  stop-color="#1E2A3A"/>
      <stop offset="60%" stop-color="#161E2A"/>
      <stop offset="100%" stop-color="#0E1620"/>
    </radialGradient>

    <linearGradient id="ray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#1FB8C1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1FB8C1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- 6 rays at 60° intervals from top-left corner -->
  <g transform="translate(0 0)">
    <polygon points="0,0  1920,80   1920,140"   fill="url(#ray)"/>
    <polygon points="0,0  1920,260  1920,300"   fill="url(#ray)" opacity="0.7"/>
    <polygon points="0,0  1920,520  1920,540"   fill="url(#ray)" opacity="0.5"/>
    <polygon points="0,0  1660,1080 1620,1080"  fill="url(#ray)" opacity="0.4" transform="rotate(-30)"/>
    <polygon points="0,0  1300,1080 1240,1080"  fill="url(#ray)" opacity="0.3" transform="rotate(-55)"/>
    <polygon points="0,0  900,1080  840,1080"   fill="url(#ray)" opacity="0.2" transform="rotate(-80)"/>
  </g>

  <!-- A small nova core glow -->
  <circle cx="0" cy="0" r="220" fill="#1FB8C1" opacity="0.04"/>
  <circle cx="0" cy="0" r="120" fill="#1FB8C1" opacity="0.08"/>
</svg>
