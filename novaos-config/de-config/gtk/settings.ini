# NovaOS — GTK 3 theme override
# Drop into /etc/skel/.config/gtk-3.0/settings.ini
# Forces a consistent dark theme for all GTK apps.
#
# We don't ship a custom GTK theme (heavy, lots of work).
# Instead, we override Adwaita-dark with our color tokens.

[Settings]
gtk-application-prefer-dark-theme = true
gtk-theme-name = Adwaita-dark
gtk-icon-theme-name = NovaOS-Icon
gtk-font-name = Inter 11
gtk-cursor-theme-name = Adwaita
gtk-cursor-theme-size = 24
# Removes rounded "client-side decorations" from Firefox headers — flatter look
gtk-decoration-layout = :minimize,maximize,close
# Enable primary paste (middle-click) — useful for terminals/code
gtk-enable-primary-paste = true
# Disable animations for accessibility/perf on low-end hardware
gtk-enable-animations = false
