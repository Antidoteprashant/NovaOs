# NovaOS — lightdm-gtk-greeter configuration
# Drop into /etc/lightdm/lightdm-gtk-greeter.conf
#
# Notes:
#   - Disable user-list (avoids leaking valid usernames)
#   - Use a custom background image and our theme

[greeter]
# --- Branding ---
background-image = /usr/share/novaos/wallpaper/login-background.png
background-color = #0E1620
theme-name = Adwaita-dark
icon-theme-name = NovaOS-Icon
font-name = Inter 11
cursor-theme-name = Adwaita
cursor-theme-size = 24
xft-antialias = true
xft-dpi = 96
xft-hintstyle = hintslight
xft-rgba = rgb

# --- Logo on top of the login box ---
logo-image-name = /usr/share/novaos/icons/novaos-logo.svg

# --- User list: disabled for security & minimalism ---
# students type their username (teaches them how login works)
show-indicators = ~language;~session;~power
show-clock = false
clock-format =

# --- Window position ---
# Centered, modest size
position = center
window-manager =

# --- Accessibility ---
reader = false

# --- Panel appearance (these names are read by lightdm-gtk-greeter's built-in CSS) ---
# We'll override via /usr/share/lightdm-gtk-greeter/greeter.css later if needed.
