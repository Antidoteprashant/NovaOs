name: Build NovaOS ISO
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install live-build
        run: sudo apt update && sudo apt install -y live-build live-config live-boot
      - name: Inspect lb_chroot_linux-image script
        run: |
          find / -iname "*chroot_linux-image*" 2>/dev/null
          cat $(find / -iname "*chroot_linux-image*" 2>/dev/null | head -1)
      - name: Build ISO
        run: sudo bash scripts/build.sh
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: novaos-iso
          path: "*.iso"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
