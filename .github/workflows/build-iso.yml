
name: Build NovaOS ISO
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install live-build
        run: |
          sudo apt update
          # --reinstall ensures symlink targets are properly extracted, not just the dangling symlinks
          sudo apt install -y --reinstall isolinux syslinux-common syslinux-utils live-build live-config live-boot
      - name: Patch live-build to skip broken Contents.gz auto-detection
        run: |
          sudo sed -i '/Contents-\${ARCH}\.gz/,+10 s/^/#SKIPPED# /' /usr/lib/live/build/lb_chroot_linux-image || true
          sudo sed -i 's/^\(.*wget.*Contents.*\)$/#\1/' /usr/lib/live/build/lb_chroot_linux-image || true
          sudo sed -i '/Contents-\${ARCH}\.gz/,+10 s/^/#SKIPPED# /' /usr/lib/live/build/lb_binary_debian-installer || true
          sudo sed -i 's/^\(.*wget.*Contents.*\)$/#\1/' /usr/lib/live/build/lb_binary_debian-installer || true
          grep -C 3 "Contents" /usr/lib/live/build/lb_* || true
      - name: Force-stage isolinux files where live-build expects them
        run: |
          sudo mkdir -p /root/isolinux

          # Diagnose symlink state before searching
          echo "=== Symlink diagnosis ==="
          ls -la /usr/share/live/build/bootloaders/isolinux/ 2>/dev/null || echo "(bootloaders dir not found)"
          ls -la /usr/lib/ISOLINUX/ 2>/dev/null || echo "(ISOLINUX lib dir not found)"

          # IMPORTANT: Use -type f to find ONLY real regular files.
          # Without -type f, find returns dangling symlinks too — they show as "Found"
          # but cp fails because the symlink target doesn't exist on disk.
          ISOLINUX_BIN=$(find / -iname "isolinux.bin" -type f 2>/dev/null | head -1)
          VESAMENU=$(find / -iname "vesamenu.c32" -type f 2>/dev/null | head -1)

          echo "Found isolinux.bin (real file) at: ${ISOLINUX_BIN:-NOT FOUND}"
          echo "Found vesamenu.c32 (real file) at: ${VESAMENU:-NOT FOUND}"

          if [ -n "$ISOLINUX_BIN" ]; then
            sudo cp "$ISOLINUX_BIN" /root/isolinux/isolinux.bin
            echo "✓ isolinux.bin staged"
          else
            echo "ERROR: No real isolinux.bin found (only broken symlinks, if any)."
            echo "All isolinux.bin entries (including symlinks):"
            find / -iname "isolinux.bin" 2>/dev/null || true
            exit 1
          fi

          if [ -n "$VESAMENU" ]; then
            sudo cp "$VESAMENU" /root/isolinux/vesamenu.c32
            echo "✓ vesamenu.c32 staged"
          else
            echo "ERROR: No real vesamenu.c32 found (only broken symlinks, if any)."
            echo "All vesamenu.c32 entries (including symlinks):"
            find / -iname "vesamenu.c32" 2>/dev/null || true
            exit 1
          fi

          echo "=== Staged files ==="
          ls -la /root/isolinux/
      - name: Build ISO
        run: sudo bash scripts/build.sh
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: novaos-iso
          path: "*.iso"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
