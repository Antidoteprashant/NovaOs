
name: Build NovaOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Install all required packages
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt update
          # --reinstall ensures symlink targets are properly extracted
          sudo apt install -y --reinstall \
            isolinux syslinux-common syslinux-utils \
            live-build live-config live-boot \
            grub-common grub-efi-amd64-bin grub-pc-bin \
            fonts-dejavu-core fonts-dejavu-extra \
            xorriso squashfs-tools

      # -----------------------------------------------------------------------
      # 2. Fix dangling symlinks: find REAL isolinux files (-type f)
      #    and stage them where live-build expects them.
      #    Root cause of previous failure: find without -type f returned a
      #    dangling symlink, which printed "Found" but cp failed because the
      #    symlink target didn't exist on disk.
      # -----------------------------------------------------------------------
      - name: Stage isolinux files (broken-symlink-safe)
        run: |
          sudo mkdir -p /root/isolinux

          echo "=== Symlink diagnosis ==="
          ls -la /usr/share/live/build/bootloaders/isolinux/ 2>/dev/null || echo "(bootloaders dir not found)"
          ls -la /usr/lib/ISOLINUX/ 2>/dev/null          || echo "(ISOLINUX lib dir not found)"
          ls -la /usr/lib/syslinux/modules/bios/ 2>/dev/null || echo "(syslinux modules dir not found)"

          # -type f = only real regular files; broken symlinks are silently skipped
          ISOLINUX_BIN=$(find / -iname "isolinux.bin" -type f 2>/dev/null | head -1)
          VESAMENU=$(find /    -iname "vesamenu.c32"  -type f 2>/dev/null | head -1)

          echo "isolinux.bin (real file): ${ISOLINUX_BIN:-NOT FOUND}"
          echo "vesamenu.c32 (real file): ${VESAMENU:-NOT FOUND}"

          if [ -n "$ISOLINUX_BIN" ]; then
            sudo cp "$ISOLINUX_BIN" /root/isolinux/isolinux.bin
            echo "✓ isolinux.bin staged"
          else
            echo "ERROR: No real isolinux.bin found. All entries (incl. symlinks):"
            find / -iname "isolinux.bin" 2>/dev/null || true
            exit 1
          fi

          if [ -n "$VESAMENU" ]; then
            sudo cp "$VESAMENU" /root/isolinux/vesamenu.c32
            echo "✓ vesamenu.c32 staged"
          else
            echo "ERROR: No real vesamenu.c32 found. All entries (incl. symlinks):"
            find / -iname "vesamenu.c32" 2>/dev/null || true
            exit 1
          fi

          echo "=== Staged files ==="
          ls -la /root/isolinux/

      # -----------------------------------------------------------------------
      # 3. Patch live-build to skip broken Contents.gz auto-detection
      # -----------------------------------------------------------------------
      - name: Patch live-build (skip Contents.gz)
        run: |
          sudo sed -i '/Contents-\${ARCH}\.gz/,+10 s/^/#SKIPPED# /' /usr/lib/live/build/lb_chroot_linux-image       || true
          sudo sed -i 's/^\(.*wget.*Contents.*\)$/#\1/'             /usr/lib/live/build/lb_chroot_linux-image       || true
          sudo sed -i '/Contents-\${ARCH}\.gz/,+10 s/^/#SKIPPED# /' /usr/lib/live/build/lb_binary_debian-installer  || true
          sudo sed -i 's/^\(.*wget.*Contents.*\)$/#\1/'             /usr/lib/live/build/lb_binary_debian-installer  || true

      # -----------------------------------------------------------------------
      # 4. Configure live-build (replaces scripts/build.sh)
      # -----------------------------------------------------------------------
      - name: Configure live-build
        run: |
          sudo lb clean --purge || true
          lb config \
            --distribution bookworm \
            --architecture amd64 \
            --archive-areas "main contrib non-free-firmware" \
            --security false \
            --linux-flavours amd64

      # -----------------------------------------------------------------------
      # 5. Stage NovaOS branding into the chroot tree
      # -----------------------------------------------------------------------
      - name: Stage NovaOS branding assets
        run: |
          mkdir -p config/includes.chroot/opt/
          cp -r novaos-config config/includes.chroot/opt/novaos-config
          echo "✓ Branding assets staged → config/includes.chroot/opt/novaos-config"

      # -----------------------------------------------------------------------
      # 6. Build the ISO
      # -----------------------------------------------------------------------
      - name: Build ISO
        run: sudo lb build 2>&1 | tee build.log

      # -----------------------------------------------------------------------
      # 7. Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: novaos-iso
          path: "*.iso"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
