
name: Build NovaOS ISO
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install live-build
        run: sudo apt update && sudo apt install -y live-build live-config live-boot
      - name: Patch live-build to skip broken Contents.gz auto-detection
        run: |
          sudo sed -i '/Contents-\${ARCH}\.gz/,+10 s/^/#SKIPPED# /' /usr/lib/live/build/lb_chroot_linux-image || true
          sudo sed -i 's/^\(.*wget.*Contents.*\)$/#\1/' /usr/lib/live/build/lb_chroot_linux-image || true
          grep -C 3 "Contents" /usr/lib/live/build/lb_chroot_linux-image || true
      - name: Build ISO
        run: sudo bash scripts/build.sh
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: novaos-iso
          path: "*.iso"
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
