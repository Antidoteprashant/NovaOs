
name: Build NovaOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 1. Install all required packages
      # -----------------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt update
          # debian-archive-keyring: needed so lb can verify Debian repo GPG on Ubuntu runner
          # --reinstall ensures symlink targets are properly extracted (not dangling)
          sudo apt install -y --reinstall \
            debian-archive-keyring \
            isolinux syslinux-common syslinux-utils \
            live-build live-config live-boot \
            grub-common grub-efi-amd64-bin grub-pc-bin \
            fonts-dejavu-core fonts-dejavu-extra \
            xorriso squashfs-tools librsvg2-bin

          # Patch live-build's lb_binary_syslinux for proper rsvg-convert usage
          # The old 'rsvg' command used different syntax (input output) vs 'rsvg-convert' (input -o output)
          sudo sed -i 's|/usr/bin/rsvg|/usr/bin/rsvg-convert|g' /usr/lib/live/build/lb_binary_syslinux || true
          sudo sed -i 's|rsvg --format|rsvg-convert --format|g' /usr/lib/live/build/lb_binary_syslinux || true
          sudo sed -i 's|splash\.svg splash\.png|splash.svg -o splash.png|g' /usr/lib/live/build/lb_binary_syslinux || true
          sudo sed -i 's|splash\.svg" "${_TARGET}/splash\.png|splash.svg" -o "${_TARGET}/splash.png|g' /usr/lib/live/build/lb_binary_syslinux || true

          # Ubuntu's live-build has a hardcoded hack for gfxboot 'bootlogo' that crashes
          # when building Debian ISOs. We patch it out here.
          sudo sed -i '/Hack around the removal of support in gfxboot/,/rm -rf "\$tmpdir"/ s/^/#/' /usr/lib/live/build/lb_binary_syslinux || true
      # -----------------------------------------------------------------------
      # 2. Fix dangling isolinux symlinks
      #    live-build's bootloaders dir has broken symlinks on Ubuntu runners.
      #    We find the REAL files (-type f skips dangling symlinks) and copy
      #    them directly into live-build's bootloaders directory so
      #    lb_binary_syslinux finds them where it actually looks.
      # -----------------------------------------------------------------------
      - name: Fix isolinux symlinks in live-build bootloaders dir
        run: |
          BOOTLOADERS_DIR="/usr/share/live/build/bootloaders/isolinux"
          sudo mkdir -p "$BOOTLOADERS_DIR"

          echo "=== Before fix ==="
          ls -la "$BOOTLOADERS_DIR/" 2>/dev/null || echo "(empty)"

          # -type f = only real regular files, skips dangling symlinks
          ISOLINUX_BIN=$(find / -iname "isolinux.bin" -type f 2>/dev/null | head -1)
          VESAMENU=$(find /    -iname "vesamenu.c32"  -type f 2>/dev/null | head -1)

          echo "isolinux.bin (real): ${ISOLINUX_BIN:-NOT FOUND}"
          echo "vesamenu.c32 (real): ${VESAMENU:-NOT FOUND}"

          if [ -z "$ISOLINUX_BIN" ]; then
            echo "ERROR: No real isolinux.bin found"
            exit 1
          fi
          if [ -z "$VESAMENU" ]; then
            echo "ERROR: No real vesamenu.c32 found"
            exit 1
          fi

          # Replace broken symlinks with real files in the bootloaders dir
          # Must rm -f first — cp refuses to write through a dangling symlink
          sudo rm -f "$BOOTLOADERS_DIR/isolinux.bin"
          sudo rm -f "$BOOTLOADERS_DIR/vesamenu.c32"
          sudo cp "$ISOLINUX_BIN" "$BOOTLOADERS_DIR/isolinux.bin"
          sudo cp "$VESAMENU"     "$BOOTLOADERS_DIR/vesamenu.c32"

          # Also copy all other .c32 modules live-build may need
          find /usr/lib/syslinux/modules/bios/ -name "*.c32" -type f 2>/dev/null | \
            while read f; do sudo cp -f "$f" "$BOOTLOADERS_DIR/"; done || true

          echo "=== After fix ==="
          ls -la "$BOOTLOADERS_DIR/"

      # -----------------------------------------------------------------------
      # 3. Patch live-build to skip broken Contents.gz auto-detection
      # -----------------------------------------------------------------------
      - name: Patch live-build (skip Contents.gz)
        run: |
          sudo sed -i '/Contents-\${ARCH}\.gz/,+10 s/^/#SKIPPED# /' /usr/lib/live/build/lb_chroot_linux-image       || true
          sudo sed -i 's/^\(.*wget.*Contents.*\)$/#\1/'             /usr/lib/live/build/lb_chroot_linux-image       || true
          sudo sed -i '/Contents-\${ARCH}\.gz/,+10 s/^/#SKIPPED# /' /usr/lib/live/build/lb_binary_debian-installer  || true
          sudo sed -i 's/^\(.*wget.*Contents.*\)$/#\1/'             /usr/lib/live/build/lb_binary_debian-installer  || true

      # -----------------------------------------------------------------------
      # 4. Configure live-build
      # -----------------------------------------------------------------------
      - name: Configure live-build
        run: |
          sudo lb clean --purge || true
          # --mode debian: prevents lb from injecting ubuntu-keyring into
          # the Debian chroot when running on an Ubuntu CI runner.
          lb config \
            --mode debian \
            --distribution bookworm \
            --architecture amd64 \
            --archive-areas "main contrib non-free-firmware" \
            --security false \
            --linux-flavours amd64 \
            --mirror-bootstrap http://deb.debian.org/debian/ \
            --mirror-chroot http://deb.debian.org/debian/ \
            --mirror-binary http://deb.debian.org/debian/ \
            --mirror-chroot-security http://security.debian.org/debian-security/ \
            --mirror-binary-security http://security.debian.org/debian-security/

      # -----------------------------------------------------------------------
      # 5. Verify branding assets (already at correct path in git)
      # -----------------------------------------------------------------------
      - name: Verify NovaOS branding assets
        run: |
          # Files committed at config/includes.chroot/opt/novaos-config/
          # live-build reads them directly — no copy needed
          ls -la "$GITHUB_WORKSPACE/config/includes.chroot/opt/novaos-config/" | head -10
          echo "✓ Branding assets present"

      # -----------------------------------------------------------------------
      # 6. Build the ISO
      # -----------------------------------------------------------------------
      - name: Build ISO
        run: |
          sudo bash -c 'set -o pipefail; lb build 2>&1 | tee build.log'
          echo "=== Build exit code: $? ==="
          echo "=== .build stage status ==="
          ls -la .build/ 2>/dev/null || echo "(no .build dir)"
          echo "=== ISO search (wide) ==="
          sudo find /home/runner /root "$GITHUB_WORKSPACE" -maxdepth 5 \
            \( -name "*.iso" -o -name "live-image*" \) 2>/dev/null || true
          ls -lh "$GITHUB_WORKSPACE"/*.iso 2>/dev/null || echo "No .iso in workspace root"

      # -----------------------------------------------------------------------
      # 7. Upload artifacts
      # -----------------------------------------------------------------------
      - name: Upload ISO
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: novaos-iso
          path: |
            *.iso
            live-image-*.hybrid.iso
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: warn
